# Docs for the Azure Functions Deploy action: https://github.com/Azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js project to Azure Function App - brompton-trace-ocr-api-09

on:
  push:
    branches:
      - main
    paths:
      - 'azure-function/**'
      - '.github/workflows/main_brompton-trace-ocr-api-09.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'azure-function'
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve project dependencies using npm
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          npm install
          npm run build --if-present
          npm run test --if-present
          test -f host.json
          test -f ocr/function.json
          test -f dist/ocr/index.js
          find . -maxdepth 3 -type f | sort
          zip -r ../release.zip .
          popd
          unzip -l release.zip | sed -n '1,80p'

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2A2C65F907AE49EF94C63180262D52E2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8DD69D1918F146E59668D6E9ACCEE4B0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B431C5DC2AC94826B99365E9FD17650B }}

      - name: Run Azure Functions Action
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'brompton-trace-ocr-api-09'
          slot-name: 'Production'
          package: release.zip
